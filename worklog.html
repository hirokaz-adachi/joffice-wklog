<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>J-Office Insight ｜ 工数管理</title>
  <link rel="stylesheet" href="styles.css?v=20260623-4">
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">J-Office Insight</p>
      <h1>顧客別工数入力管理画面</h1>
    </div>
    <div class="top-actions">
      <a class="nav-button" href="index.html">メニュー</a>
      <a class="nav-button" href="dashboard.html">ダッシュボード</a>
      <button id="exportCsv" type="button">CSV出力</button>
      <label class="file-button">
        CSV取込
        <input id="importCsv" type="file" accept=".csv,text/csv">
      </label>
    </div>
  </header>

  <section class="calendar-panel" aria-labelledby="calendarTitle">
    <div class="calendar-head">
      <button id="prevMonth" type="button" class="icon-button" aria-label="前月">‹</button>
      <div>
        <p class="calendar-label">Calendar</p>
        <h2 id="calendarTitle"></h2>
      </div>
      <button id="nextMonth" type="button" class="icon-button" aria-label="翌月">›</button>
    </div>
    <div id="monthCalendar" class="month-calendar" aria-label="月間カレンダー"></div>
  </section>

  <main class="layout">
    <section class="entry-panel" aria-labelledby="entryTitle">
      <div class="section-heading">
        <h2 id="entryTitle">入力</h2>
        <button id="copyPrevious" type="button" class="secondary">前日コピー</button>
      </div>

      <form id="entryForm" class="entry-form">
        <input id="editingId" type="hidden">

        <label>
          日付
          <input id="workDate" type="date" required>
        </label>

        <label>
          スタッフ
          <select id="staff" required></select>
        </label>

        <label>
          顧客
          <div class="combo" id="customerCombo">
            <input id="customerSearch" type="text" autocomplete="off" placeholder="顧客を検索…" aria-label="顧客検索" role="combobox" aria-expanded="false">
            <div id="customerList" class="combo-list" hidden role="listbox"></div>
          </div>
          <input type="hidden" id="customer">
        </label>

        <label>
          業務区分
          <select id="taskType" required></select>
        </label>

        <label id="phaseField" hidden>
          工程
          <select id="phase"></select>
        </label>

        <label>
          時間
          <input id="hours" type="number" min="0.25" max="24" step="0.25" value="1" required>
        </label>

        <label class="wide">
          メモ
          <input id="memo" type="text" maxlength="80" autocomplete="off">
        </label>

        <div class="form-actions wide">
          <button id="saveEntry" type="submit">登録</button>
          <button id="cancelEdit" type="button" class="secondary" hidden>編集取消</button>
        </div>
      </form>

      <div class="card-day">
        <div class="card-day-head">
          <h3>選択スタッフの当日入力</h3>
          <span id="cardDayMeta" class="card-day-meta"></span>
        </div>
        <div id="cardDayList" class="card-day-list"></div>
      </div>
    </section>

    <section class="summary-panel" aria-labelledby="summaryTitle">
      <div class="section-heading">
        <h2 id="summaryTitle">日次サマリー <span id="selectedDateLabel" class="summary-date"></span></h2>
      </div>

      <div class="metrics">
        <div class="metric">
          <span>合計時間</span>
          <strong id="dailyHours">0.00</strong>
        </div>
        <div class="metric">
          <span>入力件数</span>
          <strong id="dailyCount">0</strong>
        </div>
        <div class="metric">
          <span>顧客数</span>
          <strong id="dailyCustomers">0</strong>
        </div>
      </div>

      <div class="split">
        <div>
          <h3>スタッフ別</h3>
          <div id="staffSummary" class="summary-list"></div>
        </div>
        <div>
          <h3>顧客別</h3>
          <div id="customerSummary" class="summary-list"></div>
        </div>
      </div>
    </section>

    <section class="list-panel" aria-labelledby="listTitle">
      <div class="section-heading">
        <h2 id="listTitle">入力一覧</h2>
        <div class="filters">
          <input id="filterFrom" type="date" aria-label="開始日">
          <input id="filterTo" type="date" aria-label="終了日">
          <select id="filterStaff" aria-label="スタッフで絞り込み"></select>
          <input id="filterCustomer" type="search" placeholder="顧客検索" aria-label="顧客検索">
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>日付</th>
              <th>スタッフ</th>
              <th>顧客</th>
              <th>業務区分</th>
              <th class="num">時間</th>
              <th>メモ</th>
              <th class="actions-col">操作</th>
            </tr>
          </thead>
          <tbody id="entryRows"></tbody>
        </table>
      </div>
    </section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="config.js"></script>
  <script src="backend.js?v=20260623-1"></script>
  <script src="app.js?v=20260623-3"></script>
</body>
</html>
