<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>J-Office Insight ｜ データ訂正・編集</title>
  <link rel="stylesheet" href="styles.css?v=20260622-1">
  <link rel="stylesheet" href="data-edit.css?v=20260622-1">
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">J-Office Insight</p>
      <h1>データ訂正・編集</h1>
    </div>
    <div class="top-actions">
      <a class="nav-button" href="index.html">メニュー</a>
      <a class="nav-button" href="worklog.html">工数管理</a>
      <a class="nav-button" href="dashboard.html">ダッシュボード</a>
      <button id="reload" type="button" class="secondary">再読込</button>
    </div>
  </header>

  <main class="edit-shell">
    <section class="edit-panel">
      <div class="edit-toolbar">
        <div class="tabs" role="tablist" aria-label="編集対象">
          <button id="tabWork" type="button" class="tab is-active" role="tab" aria-selected="true">工数（worklogs）</button>
          <button id="tabBill" type="button" class="tab" role="tab" aria-selected="false">売上（billing）</button>
        </div>
        <div class="edit-actions">
          <span id="dataStatus" class="edit-status">読み込み中…</span>
          <span id="dirtyInfo" class="dirty-info" aria-live="polite"></span>
          <button id="addRow" type="button" class="secondary">＋ 行を追加</button>
          <button id="saveAll" type="button">変更を保存</button>
        </div>
      </div>

      <p class="edit-hint">セルを直接編集できます。編集・追加した行は黄色でハイライトされ、「変更を保存」でまとめて反映します。削除は各行のボタンから行います（保存済みデータは即時削除）。</p>

      <div id="panelWork" class="grid-panel" role="tabpanel">
        <div class="grid-filters">
          <label>開始日 <input type="date" id="wFrom"></label>
          <label>終了日 <input type="date" id="wTo"></label>
          <label>スタッフ <select id="wStaff"></select></label>
          <label>顧客 <select id="wCust"></select></label>
          <button id="wClear" type="button" class="secondary">クリア</button>
          <span id="wCount" class="filter-count"></span>
        </div>
        <div class="table-wrap edit-grid">
          <table>
            <thead>
              <tr>
                <th class="col-date">日付</th>
                <th class="col-staff">スタッフ</th>
                <th class="col-customer">顧客</th>
                <th class="col-task">業務区分</th>
                <th class="col-code">業務コード</th>
                <th class="col-phase">工程</th>
                <th class="col-hours num">時間</th>
                <th class="col-memo">メモ</th>
                <th class="col-ops">操作</th>
              </tr>
            </thead>
            <tbody id="workBody"></tbody>
          </table>
        </div>
      </div>

      <div id="panelBill" class="grid-panel" role="tabpanel" hidden>
        <div class="grid-filters">
          <label>請求月（開始）<input type="month" id="bFrom"></label>
          <label>請求月（終了）<input type="month" id="bTo"></label>
          <label>顧客 <select id="bCust"></select></label>
          <button id="bClear" type="button" class="secondary">クリア</button>
          <span id="bCount" class="filter-count"></span>
        </div>
        <div class="table-wrap edit-grid">
          <table class="bill-table">
            <thead>
              <tr>
                <th class="col-invid">請求ID</th>
                <th class="col-month">請求月</th>
                <th class="col-customer">顧客</th>
                <th class="col-code">業務コード</th>
                <th class="col-item">請求項目</th>
                <th class="col-pay">入金方法</th>
                <th class="col-amt num">税抜</th>
                <th class="col-amt num">消費税</th>
                <th class="col-amt num">税込</th>
                <th class="col-date2">振替日</th>
                <th class="col-date2">発行日</th>
                <th class="col-date2">入金期日</th>
                <th class="col-status">入金状況</th>
                <th class="col-memo">メモ</th>
                <th class="col-ops">操作</th>
              </tr>
            </thead>
            <tbody id="billBody"></tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="config.js"></script>
  <script src="backend.js?v=20260623-1"></script>
  <script src="data-edit.js?v=20260623-1"></script>
</body>
</html>
