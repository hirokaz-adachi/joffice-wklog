<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>J-Office Insight ｜ メニュー</title>
  <style>
    :root {
      --bg: #f4f7f7; --surface: #fff; --ink: #172026; --muted: #65737c;
      --line: #d9e1e3; --accent: #0f766e; --accent-dark: #0b5d57; --accent-soft: #dff3ef;
      --shadow: 0 12px 30px rgba(23, 32, 38, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; color: var(--ink); background: var(--bg);
      font-family: "Yu Gothic UI", "Meiryo", system-ui, sans-serif;
      display: flex; flex-direction: column; align-items: center;
    }
    .topbar { width: 100%; padding: 28px clamp(18px, 4vw, 48px); background: #fff;
      border-bottom: 1px solid var(--line); }
    .eyebrow { margin: 0 0 4px; color: var(--accent-dark); font-size: 12px; font-weight: 800; letter-spacing: .04em; }
    h1 { margin: 0; font-size: clamp(24px, 4vw, 34px); }

    /* メニュー */
    .menu { width: min(960px, 100%); padding: clamp(20px, 4vw, 40px); }
    .lead { color: var(--muted); margin: 0 0 20px; }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; }
    .card {
      display: block; text-decoration: none; color: inherit; background: var(--surface);
      border: 1px solid var(--line); border-radius: 10px; padding: 22px; box-shadow: var(--shadow);
      transition: transform .08s ease, box-shadow .08s ease, border-color .08s ease;
    }
    .card:hover { transform: translateY(-2px); border-color: var(--accent); box-shadow: 0 16px 36px rgba(23,32,38,.12); }
    .badge { display: inline-flex; align-items: center; justify-content: center;
      width: 40px; height: 40px; border-radius: 9px; background: var(--accent-soft);
      color: var(--accent-dark); font-weight: 800; font-size: 18px; margin-bottom: 14px; }
    .card h2 { margin: 0 0 6px; font-size: 18px; }
    .card p { margin: 0; color: var(--muted); font-size: 13px; line-height: 1.5; }

    /* パスワードゲート */
    .gate { position: fixed; inset: 0; z-index: 50; display: grid; place-items: center;
      padding: 24px; background: linear-gradient(180deg, #eef4f3, #f4f7f7); }
    .gate-card { width: min(380px, 100%); background: #fff; border: 1px solid var(--line);
      border-radius: 12px; padding: 28px; box-shadow: var(--shadow); text-align: center; }
    .gate-card .eyebrow { text-align: left; }
    .gate-card h2 { margin: 2px 0 18px; font-size: 20px; text-align: left; }
    .gate-form { display: grid; gap: 12px; }
    .gate-form input { min-height: 46px; border: 1px solid var(--line); border-radius: 8px;
      padding: 0 14px; font-size: 16px; }
    .gate-form input:focus { outline: 2px solid var(--accent); outline-offset: 1px; border-color: var(--accent); }
    .gate-form button { min-height: 46px; border: 1px solid var(--accent); border-radius: 8px;
      background: var(--accent); color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; }
    .gate-form button:hover { background: var(--accent-dark); border-color: var(--accent-dark); }
    .gate-error { min-height: 18px; color: #b91c1c; font-size: 13px; font-weight: 700; }
  </style>
</head>
<body>
  <!-- 簡易パスワードゲート（デモ用。本番の認証は別途設計） -->
  <div id="gate" class="gate">
    <div class="gate-card">
      <p class="eyebrow">J-Office Insight</p>
      <h2>メニュー</h2>
      <form id="gateForm" class="gate-form" autocomplete="off">
        <input id="gatePass" type="password" placeholder="パスワード" aria-label="パスワード" autofocus>
        <button type="submit">開く</button>
        <p id="gateError" class="gate-error" role="alert"></p>
      </form>
    </div>
  </div>

  <header class="topbar">
    <p class="eyebrow">J-Office Insight</p>
    <h1>メニュー</h1>
  </header>

  <main id="menu" class="menu" hidden>
    <p class="lead">利用する画面を選んでください。</p>
    <div class="cards">
      <a class="card" href="worklog.html">
        <span class="badge">工</span>
        <h2>工数管理</h2>
        <p>顧客別の工数入力・一覧・マスタ管理・CSV入出力（PC向け）。</p>
      </a>
      <a class="card" href="staff.html">
        <span class="badge">登</span>
        <h2>作業内容登録</h2>
        <p>スタッフが当日の作業時間を手早く登録（スマホ向け）。</p>
      </a>
      <a class="card" href="dashboard.html">
        <span class="badge">経</span>
        <h2>経営ダッシュボード</h2>
        <p>売上・工数・時間単価・達成率を月次で可視化。</p>
      </a>
    </div>
  </main>

  <script>
    (function () {
      "use strict";
      // デモ用の簡易パスワード。ここを書き換えれば変更できます。
      // 注意: 静的サイトのためソースに平文で入ります（デモ専用の簡易ゲート）。本番は production-auth-db-memo.md の方針で実装。
      var MENU_PASSWORD = "joffice2026";
      var UNLOCK_KEY = "joffice-menu-unlocked";

      var gate = document.getElementById("gate");
      var menu = document.getElementById("menu");
      var form = document.getElementById("gateForm");
      var pass = document.getElementById("gatePass");
      var error = document.getElementById("gateError");

      function unlock() {
        gate.hidden = true;
        gate.style.display = "none";
        menu.hidden = false;
      }

      try {
        if (window.sessionStorage && sessionStorage.getItem(UNLOCK_KEY) === "1") unlock();
      } catch (e) { /* sessionStorage不可でもゲートは表示する */ }

      form.addEventListener("submit", function (event) {
        event.preventDefault();
        if (pass.value === MENU_PASSWORD) {
          try { if (window.sessionStorage) sessionStorage.setItem(UNLOCK_KEY, "1"); } catch (e) {}
          error.textContent = "";
          unlock();
        } else {
          error.textContent = "パスワードが違います";
          pass.select();
        }
      });
    })();
  </script>
</body>
</html>
