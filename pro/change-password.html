<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>J-Office (pro) パスワード変更</title>
  <style>
    :root { --fg:#1f2937; --muted:#6b7280; --line:#e5e7eb; --accent:#2563eb; --bg:#f8fafc; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, "Segoe UI", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; color:var(--fg); background:var(--bg); }
    .wrap { max-width: 420px; margin: 8vh auto; padding: 0 16px; }
    .card { background:#fff; border:1px solid var(--line); border-radius:12px; padding:24px; }
    h1 { font-size:18px; margin:0 0 4px; }
    .sub { color:var(--muted); font-size:12px; margin:0 0 18px; }
    label { display:block; font-size:13px; margin:14px 0 4px; }
    input { width:100%; padding:10px 12px; border:1px solid var(--line); border-radius:8px; font-size:15px; }
    button { margin-top:18px; width:100%; padding:11px; border:0; border-radius:8px; background:var(--accent); color:#fff; font-size:15px; cursor:pointer; }
    .link { display:inline-block; margin-top:12px; font-size:12px; color:var(--muted); background:none; border:0; cursor:pointer; width:auto; padding:0; }
    .msg { margin-top:14px; font-size:13px; white-space:pre-wrap; padding:10px 12px; border-radius:8px; display:none; }
    .msg.err { background:#fef2f2; color:#b91c1c; display:block; }
    .msg.ok  { background:#f0fdf4; color:#15803d; display:block; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>パスワード変更</h1>
      <p class="sub" id="sub">新しいパスワードを設定してください（8文字以上）。</p>

      <label for="current">現在のパスワード</label>
      <input id="current" type="password" autocomplete="current-password">
      <label for="next">新しいパスワード</label>
      <input id="next" type="password" autocomplete="new-password">
      <label for="confirm">新しいパスワード（確認）</label>
      <input id="confirm" type="password" autocomplete="new-password">

      <button id="btnSave" type="button">変更する</button>
      <div id="msg" class="msg"></div>
      <button id="btnLogout" class="link" type="button">ログアウト</button>
    </div>
  </div>

  <script src="backend.js?v=20260626-1"></script>
  <script>
    var $ = function (id) { return document.getElementById(id); };
    function msg(t, ok) { var m = $('msg'); m.textContent = t; m.className = 'msg ' + (ok ? 'ok' : 'err'); }

    // 未ログインなら login.html へ。
    joMe().then(function (u) {
      if (u && u.mustChangePassword) { $('sub').textContent = '初回ログインのため、パスワードの変更が必要です（8文字以上）。'; }
    }).catch(function () { location.replace('login.html'); });

    $('btnLogout').addEventListener('click', function () {
      joLogout().then(function () { location.replace('login.html'); }).catch(function () { location.replace('login.html'); });
    });

    $('btnSave').addEventListener('click', async function () {
      var cur = $('current').value, nx = $('next').value, cf = $('confirm').value;
      if (nx.length < 8) { msg('新しいパスワードは8文字以上にしてください。', false); return; }
      if (nx !== cf) { msg('確認用パスワードが一致しません。', false); return; }
      try {
        await joChangePassword(cur, nx);
        msg('変更しました。メニューへ移動します。', true);
        setTimeout(function () { location.replace('index.html'); }, 700);
      } catch (e) {
        var d = (e.data && e.data.detail) || e.message;
        if (d === 'current_password_mismatch') d = '現在のパスワードが正しくありません。';
        else if (d === 'new_password_too_short') d = '新しいパスワードは8文字以上にしてください。';
        msg('変更失敗: ' + d, false);
      }
    });
  </script>
</body>
</html>
