<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>請求書</title>
  <style>
    :root { --ink:#1f2937; --muted:#6b7280; --line:#9ca3af; --soft:#d1d5db; --band:#e5e7eb; --accent:#0f766e; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; color:var(--ink); background:#eef2f3; }
    .toolbar { position:sticky; top:0; z-index:5; display:flex; gap:10px; justify-content:flex-end; padding:12px 18px; background:#fff; border-bottom:1px solid var(--soft); }
    .btn { padding:8px 14px; border:1px solid var(--soft); border-radius:8px; background:#fff; cursor:pointer; font-size:13px; text-decoration:none; color:var(--ink); }
    .btn.primary { background:var(--accent); color:#fff; border-color:var(--accent); }
    .sheet { background:#fff; width:210mm; min-height:287mm; margin:18px auto; padding:16mm 15mm; box-shadow:0 8px 30px rgba(0,0,0,.12); font-size:12px; }

    /* 見出し（御請求書＋請求日/番号） */
    .head-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:14px; }
    .doc-title { font-size:22px; font-weight:800; letter-spacing:.3em; text-align:center; background:var(--band); padding:8px 0; width:46%; border-radius:3px; }
    .doc-meta { text-align:right; font-size:12px; line-height:1.9; padding-top:4px; }
    .doc-meta b { font-weight:700; }

    /* 宛先・発行者 */
    .parties { display:flex; justify-content:space-between; gap:24px; margin-top:6px; }
    .bill-to { flex:1; min-width:0; }
    .bill-to .to-name { font-size:17px; font-weight:800; border-bottom:1.5px solid var(--ink); padding-bottom:4px; display:inline-block; min-width:60%; }
    .bill-to .to-addr { color:#374151; font-size:12px; margin-top:7px; line-height:1.7; white-space:pre-wrap; }
    .bill-to .subject { margin-top:14px; font-size:13px; }
    .bill-to .subject .lbl { color:var(--muted); margin-right:6px; }
    .bill-to .greeting { margin-top:10px; font-size:12px; line-height:1.8; color:#374151; }
    .issuer { width:46%; position:relative; font-size:12px; line-height:1.8; padding-top:2px; }
    .issuer .iname { font-size:14px; font-weight:800; }
    .issuer .seal { position:absolute; top:-2px; right:0; width:72px; height:72px; object-fit:contain; }
    .issuer-body { padding-right:84px; }
    .warn { color:#b45309; }

    /* ご請求金額 */
    .total-line { margin:20px 0 8px; }
    .total-box { display:flex; align-items:stretch; border:2px solid var(--ink); border-radius:4px; width:60%; overflow:hidden; }
    .total-box .lbl { background:var(--band); padding:11px 16px; font-size:14px; font-weight:700; display:flex; align-items:center; white-space:nowrap; }
    .total-box .val { flex:1; text-align:right; padding:11px 18px; font-size:22px; font-weight:800; font-variant-numeric:tabular-nums; }

    /* 明細表 */
    table.items { width:100%; border-collapse:collapse; font-size:12px; margin-top:6px; }
    table.items th, table.items td { border:1px solid var(--line); padding:7px 9px; }
    table.items th { background:#f1f5f9; color:#334155; font-weight:700; text-align:center; }
    table.items td.name { text-align:left; }
    table.items td.num, table.items th.num { text-align:right; font-variant-numeric:tabular-nums; }
    table.items tr.blank td { height:30px; }

    /* 税サマリ */
    .tax-wrap { display:flex; justify-content:flex-end; margin-top:10px; }
    table.tax { border-collapse:collapse; font-size:12px; width:48%; }
    table.tax td { border:1px solid var(--line); padding:7px 12px; }
    table.tax td.k { background:#f8fafc; color:#334155; }
    table.tax td.v { text-align:right; font-variant-numeric:tabular-nums; }
    table.tax tr.grand td { font-weight:800; font-size:13px; background:#eef2f3; }

    /* 支払・備考 */
    .pay { margin-top:18px; font-size:12px; line-height:1.9; }
    .pay table { border-collapse:collapse; }
    .pay td.k { color:var(--muted); padding:2px 18px 2px 0; vertical-align:top; white-space:nowrap; }
    .pay td.v { padding:2px 0; white-space:pre-wrap; }
    .remarks { margin-top:16px; }
    .remarks .lbl { font-size:11px; color:var(--muted); margin-bottom:3px; }
    .remarks .box { border:1px solid var(--line); border-radius:3px; min-height:70px; padding:10px 12px; font-size:12px; line-height:1.8; white-space:pre-wrap; }
    .foot-note { color:var(--muted); font-size:10.5px; margin-top:14px; }

    @media print {
      @page { size: A4; margin: 12mm; }
      html, body { background:#fff; }
      .toolbar { display:none; }
      /* 印刷時は min-height を解除し、@page の余白に委ねて1ページに収める。
         横は表の右罫線が印刷境界で切れないよう僅かに内側余白を残す。 */
      .sheet { box-shadow:none; margin:0; width:auto; min-height:0; padding:0 4mm; font-size:11.5px; }
      table.items tr.blank td { height:26px; }
      /* 区切りの良いブロックは途中改ページを避ける */
      .parties, .total-line, .tax-wrap, .pay, .remarks { page-break-inside:avoid; }
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <a class="btn" href="invoice-list.html">一覧へ</a>
    <button class="btn primary" onclick="window.print()">印刷 / PDF保存</button>
  </div>
  <div id="sheet" class="sheet"><p style="color:#6b7280">読み込み中…</p></div>

  <script src="backend.js?v=20260626-2"></script>
  <script>
    function esc(v){ return String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function yen(n){ return Number(n||0).toLocaleString('ja-JP'); }
    function param(n){ return new URLSearchParams(location.search).get(n) || ''; }
    function jdate(iso){ var s=String(iso||'').slice(0,10); var m=/^(\d{4})-(\d{2})-(\d{2})$/.exec(s); return m ? (m[1]+'年'+m[2]+'月'+m[3]+'日') : '—'; }
    function jmonth(ym){ var m=/^(\d{4})-(\d{2})$/.exec(String(ym||'')); return m ? (m[1]+'年'+Number(m[2])+'月分') : esc(ym); }

    var MIN_ROWS = 8; // 明細の最小行数（空行で高さを確保）

    function render(h, lines, s) {
      var regNo = h.issuerRegNo || s['issuer.regNo'] || '';

      // 税率ごと集計（税抜・税額）
      var byRate = {};
      lines.forEach(function (l){ var r = Number(l.taxRate||10); byRate[r] = byRate[r] || { net:0 }; byRate[r].net += Number(l.amount||0); });
      var rates = Object.keys(byRate).map(Number).sort(function(a,b){ return a-b; });
      var taxRows = '';
      rates.forEach(function (r){
        var net = byRate[r].net; var tax = Math.floor(net * r / 100);
        taxRows += '<tr><td class="k">税抜（' + r + '%）</td><td class="v">' + yen(net) + '</td></tr>';
        taxRows += '<tr><td class="k">消費税（' + r + '%）</td><td class="v">' + yen(tax) + '</td></tr>';
      });

      // 明細行（4列：品名／単価／数量／金額）＋空行
      var rowsHtml = lines.map(function (l){
        return '<tr><td class="name">' + esc(l.itemName) + '</td>'
          + '<td class="num">' + yen(l.unitPrice) + '</td>'
          + '<td class="num">' + (Number(l.quantity)||0) + '</td>'
          + '<td class="num">' + yen(l.amount) + '</td></tr>';
      }).join('');
      for (var i = lines.length; i < MIN_ROWS; i++) {
        rowsHtml += '<tr class="blank"><td class="name"></td><td class="num"></td><td class="num"></td><td class="num"></td></tr>';
      }

      // 発行者ブロック
      var issuerHtml = ''
        + '<div class="iname">' + (s['issuer.name'] ? esc(s['issuer.name']) : '<span class="warn">（発行者名 未設定）</span>') + '</div>'
        + (regNo ? '登録番号：' + esc(regNo) : '<span class="warn">登録番号：（未設定）</span>') + '<br>'
        + (s['issuer.address'] ? esc(s['issuer.address']) + '<br>' : '')
        + (s['issuer.tel'] ? 'TEL：' + esc(s['issuer.tel']) : '');
      var sealSrc = (s['issuer.sealImage'] || 'assets/issuer-seal.png');
      var sealHtml = '<img class="seal" src="' + esc(sealSrc) + '" alt="" onerror="this.style.display=\'none\'">';

      // 振込先
      var bank = s['issuer.bank'] ? esc(s['issuer.bank']) : '<span class="warn">（振込先 未設定）</span>';
      var honor = h.billToHonorific || '御中';

      document.getElementById('sheet').innerHTML =
        '<div class="head-top">'
        +   '<div class="doc-title">御請求書</div>'
        +   '<div class="doc-meta">請求日：<b>' + jdate(h.issueDate) + '</b><br>請求番号：<b>' + esc(h.invoiceNo) + '</b></div>'
        + '</div>'
        + '<div class="parties">'
        +   '<div class="bill-to">'
        +     '<div class="to-name">' + esc(h.billToName) + '　' + esc(honor) + '</div>'
        +     (h.billToAddress ? '<div class="to-addr">' + esc(h.billToAddress) + '</div>' : '')
        +     (h.subject ? '<div class="subject"><span class="lbl">件名：</span>' + esc(h.subject) + '</div>' : '')
        +     '<div class="greeting">いつもご利用ありがとうございます。<br>下記の通りご請求申し上げます。</div>'
        +   '</div>'
        +   '<div class="issuer">' + sealHtml + '<div class="issuer-body">' + issuerHtml + '</div></div>'
        + '</div>'
        + '<div class="total-line"><div class="total-box"><span class="lbl">ご請求金額（税込）</span><span class="val">¥' + yen(h.total) + '</span></div></div>'
        + '<table class="items"><thead><tr>'
        +   '<th class="name">品名</th><th class="num" style="width:18%">単価（税抜）</th><th class="num" style="width:12%">数量</th><th class="num" style="width:20%">金額（税抜）</th>'
        + '</tr></thead><tbody>' + rowsHtml + '</tbody></table>'
        + '<div class="tax-wrap"><table class="tax"><tbody>'
        +   taxRows
        +   '<tr class="grand"><td class="k">合計（税込）</td><td class="v">¥' + yen(h.total) + '</td></tr>'
        + '</tbody></table></div>'
        + '<div class="pay"><table><tbody>'
        +   '<tr><td class="k">支払期限</td><td class="v">' + jdate(h.dueDate) + '</td></tr>'
        +   '<tr><td class="k">振込先</td><td class="v">' + bank + '</td></tr>'
        + '</tbody></table></div>'
        + '<div class="remarks"><div class="lbl">備考</div><div class="box">' + (h.memo ? esc(h.memo) : '') + '</div></div>'
        + '<div class="foot-note">本請求書は適格請求書（インボイス）として発行しています。' + (regNo ? '' : '※登録番号は発行者設定で登録してください。') + '</div>';

      document.title = '請求書 ' + h.invoiceNo;
    }

    joMe().then(async function (u) {
      if (u.role !== 'admin') { location.replace('index.html'); return; }
      var no = param('no');
      if (!no) { document.getElementById('sheet').innerHTML = '<p>請求書番号が指定されていません。</p>'; return; }
      var boot = await joBootstrap();
      var inv = await joGetInvoice(no);
      render(inv.header, inv.lines, boot.settings || {});
    }).catch(function () { location.replace('login.html'); });
  </script>
</body>
</html>
