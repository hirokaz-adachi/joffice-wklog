<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>J-Office (pro) ｜ 請求書発行</title>
  <style>
    :root { --fg:#1f2937; --muted:#6b7280; --line:#e5e7eb; --accent:#0f766e; --accent-dark:#0b5d57; --bg:#f8fafc; --danger:#b91c1c; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, "Segoe UI", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; color:var(--fg); background:var(--bg); }
    .topbar { display:flex; justify-content:space-between; align-items:flex-start; padding:18px 24px; border-bottom:1px solid var(--line); background:#fff; }
    .eyebrow { color:var(--muted); font-size:12px; margin:0; } h1 { font-size:19px; margin:2px 0 0; }
    .top-actions { display:flex; gap:10px; align-items:center; }
    .btn { padding:8px 12px; border:1px solid var(--line); border-radius:8px; background:#fff; color:var(--fg); font-size:13px; cursor:pointer; text-decoration:none; }
    .btn.primary { background:var(--accent); color:#fff; border-color:var(--accent); }
    .btn.danger { color:var(--danger); border-color:#fecaca; }
    main { max-width:min(1400px, 96vw); margin:22px auto; padding:0 20px; }
    .panel { background:#fff; border:1px solid var(--line); border-radius:12px; padding:16px 18px; margin-bottom:16px; }
    .sub-date { display:block; color:var(--muted); font-size:11px; margin-top:2px; white-space:nowrap; }
    .filters { display:flex; gap:12px; align-items:end; flex-wrap:wrap; }
    label { display:block; font-size:12px; color:var(--muted); margin-bottom:4px; }
    input, select { padding:8px 10px; border:1px solid var(--line); border-radius:8px; font-size:14px; background:#fff; }
    table { width:100%; border-collapse:collapse; font-size:14px; }
    th, td { text-align:left; padding:8px 9px; border-bottom:1px solid var(--line); white-space:nowrap; }
    th { color:var(--muted); font-weight:600; font-size:12px; }
    td.num { text-align:right; font-variant-numeric:tabular-nums; }
    .tag { font-size:11px; border-radius:999px; padding:1px 8px; background:#e5e7eb; color:#374151; }
    .tag.draft { background:#fef9c3; color:#854d0e; } .tag.issued { background:#d1fae5; color:#065f46; } .tag.void { background:#fee2e2; color:#991b1b; }
    .tag.paid { background:#0f766e; color:#fff; } .tag.overdue { background:#fee2e2; color:#991b1b; } .tag.unpaid { background:#f3f4f6; color:#6b7280; }
    .tag.clickable { cursor:pointer; } .tag.clickable:hover { filter:brightness(0.96); text-decoration:underline; }
    details.menu { position:relative; display:inline-block; margin-left:4px; }
    details.menu > summary { list-style:none; cursor:pointer; padding:5px 10px; border:1px solid var(--line); border-radius:8px; background:#fff; font-size:13px; color:var(--muted); }
    details.menu > summary::-webkit-details-marker { display:none; }
    details.menu[open] > summary { background:#f3f4f6; }
    .menu-pop { position:absolute; right:0; top:calc(100% + 4px); background:#fff; border:1px solid var(--line); border-radius:8px; box-shadow:0 8px 22px rgba(0,0,0,.14); min-width:132px; z-index:20; padding:4px; }
    .menu-pop button { display:block; width:100%; text-align:left; padding:8px 10px; border:0; background:none; font-size:13px; cursor:pointer; border-radius:6px; color:var(--fg); }
    .menu-pop button:hover { background:#f3f4f6; } .menu-pop button.danger { color:var(--danger); }
    .ops { white-space:nowrap; text-align:right; }
    .ops .btn { padding:5px 9px; font-size:12px; margin-left:4px; }
    .msg { margin-top:12px; font-size:13px; white-space:pre-wrap; padding:9px 12px; border-radius:8px; display:none; }
    .msg.err { background:#fef2f2; color:var(--danger); display:block; } .msg.ok { background:#f0fdf4; color:#15803d; display:block; }
    .spacer { flex:1; }
    .tag.sent { background:#dbeafe; color:#1e40af; } .tag.unsent { background:#f3f4f6; color:#6b7280; }
    /* メール送信・送信履歴モーダル */
    .modal-back { position:fixed; inset:0; background:rgba(0,0,0,.4); display:flex; align-items:flex-start; justify-content:center; z-index:50; padding:40px 16px; overflow:auto; }
    .modal { background:#fff; border-radius:12px; width:min(640px,100%); box-shadow:0 20px 60px rgba(0,0,0,.3); }
    .modal-head { display:flex; justify-content:space-between; align-items:center; padding:14px 18px; border-bottom:1px solid var(--line); }
    .modal-head b { font-size:15px; }
    .modal-x { border:0; background:none; font-size:22px; line-height:1; cursor:pointer; color:var(--muted); }
    .modal-body { padding:16px 18px; }
    .modal-body label { display:block; font-size:12px; color:var(--muted); margin:12px 0 4px; }
    .modal-body input, .modal-body textarea { width:100%; padding:8px 10px; border:1px solid var(--line); border-radius:8px; font-size:14px; font-family:inherit; }
    .modal-foot { display:flex; justify-content:flex-end; gap:10px; padding:14px 18px; border-top:1px solid var(--line); }
    .dummy-banner { background:#fef3c7; color:#92400e; font-size:12px; padding:9px 18px; border-bottom:1px solid #fde68a; }
    .mail-meta { font-size:13px; color:var(--fg); }
    .mail-attach { margin-top:10px; font-size:12px; color:var(--muted); }
    .attach-chip { display:inline-block; background:#eef2ff; color:#3730a3; border-radius:6px; padding:2px 8px; }
    .mail-test { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--muted); margin-top:14px; }
    .mail-test input { width:auto; }
    table.hist { width:100%; border-collapse:collapse; font-size:13px; }
    table.hist th, table.hist td { text-align:left; padding:6px 8px; border-bottom:1px solid var(--line); white-space:nowrap; }
    table.hist th { color:var(--muted); font-weight:600; font-size:12px; }
  </style>
  <link rel="stylesheet" href="header.css?v=20260626-1">
</head>
<body>
  <header class="jo-topbar">
    <div class="jo-brand">
      <img class="jo-icon" src="assets/icons/j-office-invoice-96.png" alt="">
      <div class="jo-brand-text"><p class="jo-eyebrow">J-Office Invoice</p><h1 class="jo-title">請求書発行</h1></div>
    </div>
    <div class="top-actions">
      <span id="whoami"></span>
      <a class="jo-nav" href="invoice-settings.html">発行者設定</a>
      <a class="jo-nav jo-home" href="index.html#invoice">メニュー</a>
      <button id="logout" class="jo-nav" type="button">ログアウト</button>
    </div>
  </header>

  <main>
    <section class="panel">
      <div class="filters">
        <div><label>請求月</label><input id="f_month" type="month" style="width:150px"></div>
        <div><label>顧客</label><select id="f_customer"></select></div>
        <div><label>状態</label><select id="f_status">
          <option value="">すべて</option><option value="draft">下書き</option><option value="issued">発行済</option><option value="void">取消</option>
        </select></div>
        <div><label>入金</label><select id="f_pay">
          <option value="">すべて</option><option value="unpaid">未入金</option><option value="overdue">期限超過</option><option value="paid">入金済</option>
        </select></div>
        <div><label>送付</label><select id="f_send">
          <option value="">すべて</option><option value="unsent">未送付</option><option value="sent">送付済</option>
        </select></div>
        <div style="align-self:center"><label style="display:flex;align-items:center;gap:6px;margin:0;cursor:pointer;font-size:13px;color:var(--fg)"><input type="checkbox" id="f_showVoid" style="margin:0"> 取消を表示</label></div>
        <button id="btnClear" class="btn" type="button">クリア</button>
        <div class="spacer"></div>
        <a class="btn primary" href="invoice-edit.html">＋ 新規作成</a>
      </div>
      <div id="msg" class="msg"></div>
    </section>

    <section class="panel">
      <table>
        <thead><tr><th>請求番号</th><th>顧客</th><th>請求月</th><th>発行日</th><th>支払期限</th><th class="num">税込</th><th>状態</th><th>入金状況</th><th>送付状況</th><th class="ops">操作</th></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </section>
  </main>

  <!-- メール送信モーダル -->
  <div id="mailModal" class="modal-back" style="display:none">
    <div class="modal">
      <div class="modal-head"><b>メール送信</b><button class="modal-x" id="mailClose" type="button" aria-label="閉じる">×</button></div>
      <div class="dummy-banner" id="mailDummyBanner">※現在はダミー送信です。実際にはメールは送信されません（送信記録のみ作成されます）。</div>
      <div class="modal-body">
        <div class="mail-meta" id="mailMeta"></div>
        <label>宛先 To（カンマ区切りで複数可）</label>
        <input id="mailTo" type="text" autocomplete="off">
        <label>Cc（任意）</label>
        <input id="mailCc" type="text" autocomplete="off">
        <label>件名</label>
        <input id="mailSubject" type="text">
        <label>本文</label>
        <textarea id="mailBody" rows="10"></textarea>
        <div class="mail-attach" id="mailAttach"></div>
        <label class="mail-test"><input type="checkbox" id="mailTest"> テスト送信（送信状況を更新しません。履歴には「テスト」として残ります）</label>
      </div>
      <div class="modal-foot">
        <button class="btn" id="mailCancel" type="button">キャンセル</button>
        <button class="btn primary" id="mailSend" type="button">送信</button>
      </div>
    </div>
  </div>

  <!-- 送信履歴モーダル -->
  <div id="histModal" class="modal-back" style="display:none">
    <div class="modal">
      <div class="modal-head"><b>送信履歴</b><button class="modal-x" id="histClose" type="button" aria-label="閉じる">×</button></div>
      <div class="modal-body"><div id="histBody"></div></div>
      <div class="modal-foot"><button class="btn" id="histCancel" type="button">閉じる</button></div>
    </div>
  </div>

  <script src="backend.js?v=20260701-post"></script>
  <script>
    var $ = function (id) { return document.getElementById(id); };
    var rows = [], customers = [];
    function msg(t, ok) { var m = $('msg'); m.textContent = t; m.className = 'msg ' + (ok ? 'ok' : 'err'); }
    function esc(v) { return String(v == null ? '' : v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function yen(n) { return Number(n || 0).toLocaleString('ja-JP'); }
    function custName(code) { var c = customers.find(function (x){ return x.code === code; }); return c ? c.name : code; }

    $('logout').addEventListener('click', function () { joLogout().then(function(){ location.replace('login.html'); }).catch(function(){ location.replace('login.html'); }); });
    // 全フィルタをクライアント側で即時絞り込み（絞込ボタン廃止・挙動統一）
    ['f_month', 'f_customer', 'f_status', 'f_pay', 'f_send', 'f_showVoid'].forEach(function (id) { $(id).addEventListener('change', render); });
    $('btnClear').addEventListener('click', function () { $('f_month').value = ''; $('f_customer').value = ''; $('f_status').value = ''; $('f_pay').value = ''; $('f_send').value = ''; $('f_showVoid').checked = false; render(); });
    // 「⋯」メニュー：外側クリックで閉じる
    document.addEventListener('click', function (ev) {
      document.querySelectorAll('details.menu[open]').forEach(function (d) { if (!d.contains(ev.target)) d.removeAttribute('open'); });
    });

    function statusTag(s) {
      var label = s === 'draft' ? '下書き' : s === 'issued' ? '発行済' : s === 'void' ? '取消' : s;
      return '<span class="tag ' + esc(s) + '">' + label + '</span>';
    }

    function todayStr() {
      var d = new Date();
      return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    }
    // 前月（当月−1）の 'YYYY-MM'。初期表示の請求月フィルタ既定（ダッシュボードと同じ）。
    function prevMonthStr() {
      var d = new Date(); d.setDate(1); d.setMonth(d.getMonth() - 1);
      return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
    }
    // 入金状況（発行済みのみ派生表示・タグクリックで消込/取消）: paid/overdue/unpaid、下書き/取消は na
    function payInfo(r) {
      if (r.status !== 'issued') return { key: 'na', html: '<span style="color:var(--muted)">—</span>' };
      if (r.paidDate) {
        var by = r.paidByName || r.paidBy || '';
        // 入金済タグは表示専用（取消は誤操作防止のため⋯メニューから）
        return { key: 'paid', html: '<span class="tag paid" title="入金確認者: ' + esc(by) + '">入金済</span><span class="sub-date">' + esc(String(r.paidDate).slice(0, 10)) + '</span>' };
      }
      if (r.dueDate && String(r.dueDate).slice(0, 10) < todayStr()) return { key: 'overdue', html: '<span class="tag overdue clickable" data-paid="' + esc(r.invoiceNo) + '" title="クリックで入金済にする">期限超過</span>' };
      return { key: 'unpaid', html: '<span class="tag unpaid clickable" data-paid="' + esc(r.invoiceNo) + '" title="クリックで入金済にする">未入金</span>' };
    }
    // 送付状況（発行済みのみ派生表示・未送付タグクリックでメール送信モーダル）: sent/unsent、下書き/取消は na
    function methodLabel(m) { return m === 'post' ? '郵送' : 'メール'; }
    function sendInfo(r) {
      if (r.status !== 'issued') return { key: 'na', html: '<span style="color:var(--muted)">—</span>' };
      if (r.sentDate) {
        var by = r.sentByName || r.sentBy || '';
        var cnt = r.sentCount > 1 ? '（' + r.sentCount + '回）' : '';
        return { key: 'sent', html: '<span class="tag sent" title="送付者: ' + esc(by) + '">送付済（' + methodLabel(r.sentMethod) + '）</span><span class="sub-date">' + esc(String(r.sentDate).slice(0, 10)) + cnt + '</span>' };
      }
      return { key: 'unsent', html: '<span class="tag unsent clickable" data-mail="' + esc(r.invoiceNo) + '" title="クリックでメール送信">未送付</span>' };
    }
    // 「⋯」オーバーフローメニュー（低頻度・破壊的操作を格納）
    function menu(items, no) {
      var body = items.map(function (it) {
        return '<button ' + it.d + '="' + esc(no) + '"' + (it.danger ? ' class="danger"' : '') + '>' + esc(it.t) + '</button>';
      }).join('');
      return '<details class="menu"><summary>⋯</summary><div class="menu-pop">' + body + '</div></details>';
    }

    function render() {
      var mf = $('f_month').value, cf = $('f_customer').value, sf = $('f_status').value, pf = $('f_pay').value, sdf = $('f_send').value, showVoid = $('f_showVoid').checked;
      var list = rows.filter(function (r) {
        // 取消はデフォルト非表示。「取消を表示」ON、または状態で明示的に「取消」を選んだ時のみ表示。
        if (r.status === 'void' && !showVoid && sf !== 'void') return false;
        if (mf && r.billingMonth !== mf) return false;
        if (cf && r.customerCode !== cf) return false;
        if (sf && r.status !== sf) return false;
        if (pf && payInfo(r).key !== pf) return false;
        if (sdf && sendInfo(r).key !== sdf) return false;
        return true;
      });
      $('tbody').innerHTML = list.map(function (r) {
        var no = r.isDraft ? '<span class="tag draft">下書き</span>' : esc(r.invoiceNo);
        var view = '<a class="btn" href="invoice-edit.html?no=' + encodeURIComponent(r.invoiceNo) + '">' + (r.status === 'draft' ? '編集' : '表示') + '</a>';
        var ops = '';
        if (r.status === 'draft') {
          ops += view;
          ops += '<button class="btn primary" data-issue="' + esc(r.invoiceNo) + '">確定発行</button>';
          ops += menu([{ t: '削除', d: 'data-del', danger: true }], r.invoiceNo);
        } else if (r.status === 'issued') {
          ops += view;
          ops += '<button class="btn" data-mail="' + esc(r.invoiceNo) + '">' + (r.sentDate ? '再送' : 'メール') + '</button>';
          var items = [{ t: 'PDF', d: 'data-pdf' }, { t: '複製', d: 'data-dup' }, { t: '郵送済みにする', d: 'data-posted' }, { t: '送付履歴', d: 'data-history' }];
          if (r.sentDate) items.push({ t: '送付取消', d: 'data-unsent' });
          if (r.paidDate) items.push({ t: '入金取消', d: 'data-unpaid' }); // 入金済は先に入金取消（void不可）
          else items.push({ t: '取消', d: 'data-void', danger: true });
          ops += menu(items, r.invoiceNo);
        } else { // void
          ops += view;
          ops += menu([{ t: '再作成（複製）', d: 'data-dup' }], r.invoiceNo);
        }
        return '<tr>'
          + '<td>' + no + '</td>'
          + '<td>' + esc(r.customer || custName(r.customerCode)) + '</td>'
          + '<td>' + esc(r.billingMonth) + '</td>'
          + '<td>' + esc(r.issueDate || '—') + '</td>'
          + '<td>' + esc(r.dueDate || '—') + '</td>'
          + '<td class="num">' + yen(r.total) + '</td>'
          + '<td>' + statusTag(r.status) + '</td>'
          + '<td>' + payInfo(r).html + '</td>'
          + '<td>' + sendInfo(r).html + '</td>'
          + '<td class="ops">' + ops + '</td>'
          + '</tr>';
      }).join('') || '<tr><td colspan="10" style="color:var(--muted)">該当する請求書がありません。</td></tr>';
    }

    async function load() {
      try {
        rows = await joListInvoices({}); // 全件取得→画面側で絞り込み（挙動統一のため）
        render(); msg('', true); $('msg').className = 'msg';
      } catch (e) { msg('読み込み失敗: ' + (e.message || e), false); }
    }

    $('tbody').addEventListener('click', async function (ev) {
      var t = ev.target;
      var issue = t.getAttribute('data-issue'), del = t.getAttribute('data-del'), vd = t.getAttribute('data-void'), dup = t.getAttribute('data-dup');
      var paid = t.getAttribute('data-paid'), unpaid = t.getAttribute('data-unpaid');
      var posted = t.getAttribute('data-posted'), unsent = t.getAttribute('data-unsent');
      var mail = t.getAttribute('data-mail'), hist = t.getAttribute('data-history'), pdf = t.getAttribute('data-pdf');
      if (mail || hist || pdf) {
        document.querySelectorAll('details.menu[open]').forEach(function (d) { d.removeAttribute('open'); });
        if (pdf) window.open(joInvoicePdfUrl(pdf), '_blank');
        else if (mail) openMail(mail);
        else openHistory(hist);
        return;
      }
      try {
        if (issue) { if (!confirm('この下書きを確定発行します。番号採番・請求データへの反映が行われます。よろしいですか？')) return; var r = await joIssueInvoice(issue); msg('発行しました：' + r.invoiceNo, true); await load(); }
        else if (del) { if (!confirm('この下書きを削除しますか？')) return; await joDeleteInvoiceDraft(del); msg('削除しました。', true); await load(); }
        else if (vd) { if (!confirm('発行済み請求書を取消します。請求データへの反映も取り消されます（請求書は取消として保持）。よろしいですか？')) return; await joVoidInvoice(vd); msg('取消しました。', true); await load(); }
        else if (paid) { var pd = prompt('入金日を入力してください（YYYY-MM-DD）。', todayStr()); if (pd === null) return; await joMarkInvoicePaid(paid, pd.trim()); msg('入金済にしました：' + paid, true); await load(); }
        else if (unpaid) { if (!confirm('入金記録を取り消して未入金に戻しますか？')) return; await joUnmarkInvoicePaid(unpaid); msg('入金を取り消しました：' + unpaid, true); await load(); }
        else if (posted) { var qd = prompt('郵送日を入力してください（YYYY-MM-DD）。', todayStr()); if (qd === null) return; await joMarkInvoicePosted(posted, qd.trim()); msg('郵送済みにしました：' + posted, true); await load(); }
        else if (unsent) { if (!confirm('送付記録を取り消して未送付に戻しますか？（送付履歴は残ります）')) return; await joUnmarkInvoiceSent(unsent); msg('送付を取り消しました：' + unsent, true); await load(); }
        else if (dup) { var d = await joDuplicateInvoice(dup, {}); location.href = 'invoice-edit.html?no=' + encodeURIComponent(d.invoiceNo); }
      } catch (e) {
        var code = (e.data && e.data.detail) || e.message || String(e);
        var map = { paid_cannot_void: '入金済みのため取消できません。先に「入金取消」を行ってください。' };
        msg('操作失敗: ' + (map[code] || code), false);
      }
    });

    // ===== メール送信モーダル =====
    var mailNo = null;
    function openMail(no) {
      mailNo = no;
      $('mailTo').value = ''; $('mailCc').value = ''; $('mailSubject').value = ''; $('mailBody').value = ''; $('mailTest').checked = false;
      $('mailAttach').innerHTML = '';
      $('mailMeta').textContent = '読み込み中…';
      $('mailModal').style.display = 'flex';
      joGetInvoiceMailDraft(no).then(function (d) {
        var warn = d.to ? '' : ' <span style="color:#b45309">※顧客マスタに送付先メール未登録</span>';
        $('mailMeta').innerHTML = '請求番号 <b>' + esc(d.invoiceNo) + '</b> ／ ' + esc(custName(d.customerCode)) + warn;
        $('mailTo').value = d.to || ''; $('mailCc').value = d.cc || '';
        $('mailSubject').value = d.subject || ''; $('mailBody').value = d.body || '';
        $('mailAttach').innerHTML = '添付：<span class="attach-chip">' + esc(d.pdfName) + '</span>';
        $('mailDummyBanner').style.display = (d.driver === 'dummy') ? 'block' : 'none';
      }).catch(function (e) { $('mailMeta').textContent = '取得失敗: ' + (e.message || e); });
    }
    function closeMail() { $('mailModal').style.display = 'none'; mailNo = null; }
    $('mailClose').addEventListener('click', closeMail);
    $('mailCancel').addEventListener('click', closeMail);
    $('mailModal').addEventListener('click', function (ev) { if (ev.target === this) closeMail(); });
    $('mailSend').addEventListener('click', async function () {
      if (!mailNo) return;
      var no = mailNo, to = $('mailTo').value.trim();
      if (!to) { alert('宛先（To）を入力してください。'); return; }
      var isTest = $('mailTest').checked;
      if (!confirm('この内容で' + (isTest ? 'テスト送信' : '送信') + 'します。よろしいですか？\n宛先: ' + to)) return;
      var btn = this; btn.disabled = true;
      try {
        var r = await joSendInvoiceMail(no, { to: to, cc: $('mailCc').value.trim(), subject: $('mailSubject').value, body: $('mailBody').value, isTest: isTest ? 1 : 0 });
        closeMail();
        msg((r.driver === 'dummy' ? '（ダミー送信）' : '') + (r.isTest ? 'テスト送信を記録しました' : '送信しました') + '：' + r.invoiceNo, true);
        await load();
      } catch (e) {
        var code = (e.data && e.data.detail) || e.message || String(e);
        var map = { to_required: '宛先（To）を入力してください。', subject_required: '件名を入力してください。', not_sendable: '発行済みの請求書のみ送信できます。', invoice_not_found: '請求書が見つかりません。' };
        if (/^invalid_email:/.test(code)) code = 'メールアドレスの形式が不正です：' + code.slice(14);
        else if (/^send_failed:/.test(code)) code = '送信に失敗しました：' + code.slice(12);
        msg('送信失敗: ' + (map[code] || code), false);
      } finally { btn.disabled = false; }
    });

    // ===== 送信履歴モーダル =====
    function openHistory(no) {
      $('histBody').innerHTML = '読み込み中…';
      $('histModal').style.display = 'flex';
      joListInvoiceMails(no).then(function (list) {
        if (!list.length) { $('histBody').innerHTML = '<div style="color:var(--muted)">送信履歴はありません。</div>'; return; }
        $('histBody').innerHTML = '<table class="hist"><thead><tr><th>日時</th><th>手段</th><th>結果</th><th>宛先</th><th>件名</th><th>操作者</th></tr></thead><tbody>' +
          list.map(function (m) {
            var res = m.isTest ? '<span class="tag">テスト</span>' : (m.result === 'sent' ? '<span class="tag sent">送付済</span>' : '<span class="tag void">失敗</span>');
            var drv = (m.method !== 'post' && m.driver === 'dummy') ? ' <span style="color:var(--muted);font-size:11px">(ダミー)</span>' : '';
            var when = esc(String(m.createdAt || '').slice(0, 16).replace('T', ' '));
            return '<tr><td>' + when + '</td><td>' + methodLabel(m.method) + '</td><td>' + res + drv + '</td><td>' + esc(m.toAddr) + '</td><td>' + esc(m.subject) + '</td><td>' + esc(m.sentByName || m.sentBy || '') + '</td></tr>';
          }).join('') + '</tbody></table>';
      }).catch(function (e) { $('histBody').innerHTML = '取得失敗: ' + (e.message || e); });
    }
    function closeHistory() { $('histModal').style.display = 'none'; }
    $('histClose').addEventListener('click', closeHistory);
    $('histCancel').addEventListener('click', closeHistory);
    $('histModal').addEventListener('click', function (ev) { if (ev.target === this) closeHistory(); });

    joMe().then(async function (u) {
      if (u.mustChangePassword) { location.replace('change-password.html'); return; }
      if (u.role !== 'admin') { location.replace('index.html'); return; }
      var boot = await joBootstrap();
      customers = boot.customers || [];
      $('f_customer').innerHTML = '<option value="">すべて</option>' + customers.map(function (c){ return '<option value="' + esc(c.code) + '">' + esc(c.code + ' ' + c.name) + '</option>'; }).join('');
      $('f_month').value = prevMonthStr(); // 初期表示は前月（当月−1）で絞り込み。クリアで全件表示。
      await load();
    }).catch(function () { location.replace('login.html'); });
  </script>
</body>
</html>
