<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>J-Office Insight ｜ 工数管理</title>
  <link rel="stylesheet" href="styles.css?v=20260625-1">
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">J-Office Insight</p>
      <h1>工数 照会・訂正</h1>
    </div>
    <div class="top-actions">
      <a class="nav-button nav-home" href="index.html">メニュー</a>
      <a class="nav-button" href="master.html">マスタ</a>
      <a class="nav-button" href="targets.html">売上目標</a>
      <a class="nav-button" href="data-edit.html">請求 照会・訂正</a>
      <button id="exportCsv" type="button">CSV出力</button>
      <label class="file-button">
        CSV取込
        <input id="importCsv" type="file" accept=".csv,text/csv">
      </label>
    </div>
  </header>

  <section class="calendar-panel" aria-labelledby="calendarTitle">
    <div class="calendar-head">
      <button id="prevMonth" type="button" class="icon-button" aria-label="前月">‹</button>
      <div>
        <p class="calendar-label">Calendar</p>
        <h2 id="calendarTitle"></h2>
      </div>
      <button id="nextMonth" type="button" class="icon-button" aria-label="翌月">›</button>
    </div>
    <div id="monthCalendar" class="month-calendar" aria-label="月間カレンダー"></div>
  </section>

  <main class="layout">
    <section class="summary-panel is-collapsed" id="summaryPanel" aria-labelledby="summaryTitle">
      <button type="button" class="summary-toggle" id="summaryToggle" aria-expanded="false" aria-controls="summaryBody">
        <span class="summary-toggle-title"><span class="chevron" aria-hidden="true">▸</span> <span id="summaryTitle">日次サマリー</span> <span id="selectedDateLabel" class="summary-date"></span></span>
        <span class="summary-toggle-total">合計 <strong id="dailyHours">0.00</strong>h ・ <span id="dailyCount">0</span>件 ・ <span id="dailyCustomers">0</span>社</span>
      </button>
      <div class="summary-body" id="summaryBody">
        <div class="split">
          <div>
            <h3>スタッフ別</h3>
            <div id="staffSummary" class="summary-list"></div>
          </div>
          <div>
            <h3>顧客別</h3>
            <div id="customerSummary" class="summary-list summary-list-scroll"></div>
          </div>
        </div>
      </div>
    </section>

    <section class="list-panel" aria-labelledby="listTitle">
      <div class="section-heading">
        <h2 id="listTitle">入力一覧</h2>
        <div class="list-tools">
          <button id="newEntry" type="button">＋ 新規登録</button>
          <div class="filters">
            <input id="filterFrom" type="date" aria-label="開始日">
            <input id="filterTo" type="date" aria-label="終了日">
            <select id="filterStaff" aria-label="スタッフで絞り込み"></select>
            <input id="filterCustomer" type="search" placeholder="顧客検索" aria-label="顧客検索">
          </div>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>日付</th>
              <th>スタッフ</th>
              <th>顧客</th>
              <th>業務区分</th>
              <th class="num">時間</th>
              <th>メモ</th>
              <th class="actions-col">操作</th>
            </tr>
          </thead>
          <tbody id="entryRows"></tbody>
        </table>
      </div>
    </section>
  </main>

  <!-- 工数 編集/新規 モーダル -->
  <div class="modal-overlay" id="entryModal" hidden>
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="entryModalTitle">
      <div class="modal-head">
        <h2 id="entryModalTitle">工数の登録</h2>
        <button type="button" class="modal-x" id="entryModalClose" aria-label="閉じる">×</button>
      </div>
      <form id="entryForm" class="entry-form">
        <input id="editingId" type="hidden">

        <label>
          日付
          <input id="workDate" type="date" required>
        </label>

        <label>
          スタッフ
          <select id="staff" required></select>
        </label>

        <label>
          顧客
          <div class="combo" id="customerCombo">
            <input id="customerSearch" type="text" autocomplete="off" placeholder="顧客を検索…" aria-label="顧客検索" role="combobox" aria-expanded="false">
            <div id="customerList" class="combo-list" hidden role="listbox"></div>
          </div>
          <input type="hidden" id="customer">
        </label>

        <label>
          業務区分
          <select id="taskType" required></select>
        </label>

        <label id="phaseField" hidden>
          工程
          <select id="phase"></select>
        </label>

        <label>
          時間
          <input id="hours" type="number" min="0.25" max="24" step="0.25" value="1" required>
        </label>

        <label class="wide">
          メモ
          <textarea id="memo" rows="2" maxlength="80" autocomplete="off" placeholder="任意（改行可・Ctrl+Enterで登録）"></textarea>
        </label>

        <div class="form-actions wide">
          <button id="saveEntry" type="submit">登録</button>
          <button id="cancelEdit" type="button" class="secondary">キャンセル</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 削除確認 モーダル -->
  <div class="modal-overlay" id="confirmModal" hidden>
    <div class="modal-card modal-confirm" role="alertdialog" aria-modal="true" aria-labelledby="confirmTitle">
      <h2 id="confirmTitle">入力を削除しますか？</h2>
      <p id="confirmText" class="confirm-text"></p>
      <div class="form-actions">
        <button type="button" class="danger-solid" id="confirmDelete">削除する</button>
        <button type="button" class="secondary" id="confirmCancel">キャンセル</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="backend.js?v=20260625-4"></script>
  <script src="allocation.js?v=20260625-1"></script>
  <script>
    joMe().then(function () {
      var s = document.createElement('script');
      s.src = 'app.js?v=20260625-2';
      document.body.appendChild(s);
    }).catch(function () { location.replace('login.html'); });
  </script>
</body>
</html>
